baseURL = "https://butterswords.com"
title = "Butterswords | Where Words >= Swords"
author = "Nathan Butters"
locale = "en"
DefaultContentLanguage = "en"
enableInlineShortcodes = true
enableRobotsTXT = true

# Please enable this feature if the site is available in Japanese, Chinese or Korean.
#hasCJKLanguage = true

[services]
  [services.googleAnalytics]
  # If you're using Google Analytics, you can enable this feature.
  #id = "G-1234567890"

[params]
  [params.site]
  name = "Navigating tradeoffs between safety and value in system development."

[menu]
  [[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 1

  [[menu.main]]
  identifier = "blog"
  name = "Blog"
  url = "/blog/"
  weight = 1.1

  [[menu.main]]
  identifier = "projects"
  name = "Projects"
  url = "/projects/"
  weight = 2

 # [[menu.main]]
 # identifier = "offerings"
 # name = "Offerings"
 # url = "/offerings/"
 # weight = 3

  [[menu.main]]
  identifier = "bookshelf"
  name = "Bookshelf"
  url = "/bookshelf/"
  weight = 5

  [[menu.main]]
  identifier = "contact"
  name = "Contact"
  url = "/contact/"
  weight = 6

[taxonomies]
category = "categories"
tag = "tags"
series = "series"

[privacy]
  [privacy.vimeo]
  disabled = false
  simple = false

  [privacy.x]
  disabled = false
  enableDNT = true
  simple = false

  [privacy.instagram]
  disabled = false
  simple = false

  [privacy.youtube]
  disabled = false
  privacyEnhanced = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
    unsafe = true

[build]
  [build.buildStats]
  enable = true
  [[build.cachebusters]]
  source = 'assets/notwatching/hugo_stats\.json'
  target = 'css'

[module]
  [[module.mounts]]
  source = 'assets'
  target = 'assets'
  [[module.mounts]]
  disableWatch = true
  source = 'hugo_stats.json'
  target = 'assets/notwatching/hugo_stats.json'
