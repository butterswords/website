{{ define "main" }}
<div class="mx-auto my-10 max-w-6xl px-4 sm:px-6 lg:px-8">
    <header class="mb-8 text-center md:text-left">
        <h1 class="text-3xl md:text-5xl font-extrabold text-tlgray-800 mb-6 leading-tight">{{ .Title }}</h1>
    </header>
    <div class="content prose prose-lg max-w-none text-tlgray-700 mb-10">{{ .Content }}</div>
    {{ if gt (len .Pages) 0 }}
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
    {{ range .Pages.ByWeight }}
    {{ .Render "summary" }}
    {{ end }}
    </div>
    {{ else }}
    <p class="text-tlgray-500 italic text-center">
        Nothing here yet. Add one with
        <code>hugo new --kind offering_template content/offerings/your-offering-slug.md</code>.
    </p>
    {{ end }}
</div>
{{ end }}
