{{ define "main" }}
<div class="mx-auto my-10 max-w-6xl px-4 sm:px-6 lg:px-8">
    <header class="mb-8 text-center md:text-left">
        <h1 class="text-3xl md:text-5xl font-extrabold text-tlgray-800 mb-6 leading-tight">{{ .Title }}</h1>
        <div class="flex flex-wrap items-center justify-center md:justify-start text-sm text-tlgray-500 gap-6 mb-6 border-b border-tlgray-200 pb-6">
            <div class="flex items-center">
                {{ len .Pages }} {{ if eq (len .Pages) 1 }}project{{ else }}projects{{ end }}
            </div>
        </div>
    </header>
    <div class="content py-1 mb-8 text-center max-w-2xl mx-auto">{{ .Content }}</div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
    {{ range .Pages.ByWeight }}
    {{ .Render "summary" }}
    {{ end }}
    </div>
</div>
{{ end }}
