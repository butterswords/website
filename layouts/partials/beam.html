{{- $caption := .caption -}}
{{- $isLg := eq (.size | default "lg") "lg" -}}
{{- $barH := cond $isLg "5px" "4px" -}}
{{- $knob := cond $isLg "15px" "12px" -}}
{{- $ring := cond $isLg "2.5px" "2px" -}}
{{- $knobOffset := cond $isLg "-5px" "-4px" -}}
<div class="flex flex-col gap-[7px]{{ with .class }} {{ . }}{{ end }}" style="max-width:420px">
  <div class="flex justify-between font-mono font-medium text-[10.5px] tracking-[.02em]" style="color:var(--color-mono-muted)">
    <span>SAFETY</span><span>VALUE</span>
  </div>
  <div class="relative rounded-[3px]" style="height:{{ $barH }};background:linear-gradient(90deg,var(--color-beam-start),#B9A9E8)">
    <div class="absolute rounded-full" style="left:46%;top:{{ $knobOffset }};width:{{ $knob }};height:{{ $knob }};background:var(--color-knockout);border:{{ $ring }} solid var(--color-iron)"></div>
  </div>
  {{ with $caption }}
  <div class="font-mono text-[10.5px] leading-[1.5]" style="color:var(--color-mono-muted)">{{ . }}</div>
  {{ end }}
</div>
