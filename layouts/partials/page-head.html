{{- $path := .path -}}
{{- $title := .title -}}
{{- $deck := .deck -}}
<div class="mb-7">
  <div class="font-mono font-medium text-[11px] tracking-[.12em] mb-2.5" style="color:var(--color-mono-label)">{{ $path }}</div>
  <h1 class="font-sans font-semibold text-[32px] tracking-[-.01em] mb-2" style="color:var(--color-ink)">{{ $title }}</h1>
  {{ with $deck }}
  <p class="font-serif italic text-[15px] leading-[1.55]" style="color:var(--color-serif-muted)">{{ . }}</p>
  {{ end }}
</div>
