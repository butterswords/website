<header class="flex items-center justify-between flex-wrap gap-y-3 gap-x-6 px-6 sm:px-12 py-4" style="background:var(--color-chrome);color:var(--color-chrome-text)">
  <div class="flex items-center gap-3">
    <a href="{{ "/" | relURL }}" class="inline-flex items-center" aria-label="{{ .Site.Title }} home">
      {{ partial "wordmark.html" . }}
    </a>
    <!--{{ if .IsHome }}
    <span class="hidden sm:inline font-mono text-[10.5px] tracking-[.1em]" style="color:var(--color-chrome-muted-2)">SYSTEM SAFETY DEVELOPMENT, LLC</span>
    {{ end }} to be added back in when I actually build the LLC--> 
  </div>
  <div class="flex items-center gap-5 sm:gap-6 font-sans font-medium text-[13px]">
    {{- range .Site.Menus.main }}
    {{- $active := or (eq $.RelPermalink .URL) (and (ne .URL "/") (strings.HasPrefix $.RelPermalink .URL)) }}
    <a href="{{ .URL | safeURL }}" class="hover:opacity-80 transition-opacity" style="color:{{ if $active }}var(--color-heather-tint){{ else }}var(--color-chrome-text){{ end }}">{{ .Name }}</a>
    {{- end }}
    <button type="button" id="theme-toggle" aria-label="Toggle dark mode" class="inline-flex items-center justify-center w-[30px] h-[30px] rounded-full text-[13px] shrink-0" style="border:1px solid #39434D">◐</button>
  </div>
</header>
