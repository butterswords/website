{{ define "main" }}

<div class="px-6 sm:px-12 py-10 lg:py-11">
  <div class="max-w-[660px] mx-auto">

    {{ partial "page-head.html" (dict "path" (printf "~/%s" (upper .Title)) "title" .Title) }}

    <div class="prose max-w-none">
      {{ .Content }}
    </div>

    {{ if gt (len .Pages) 0 }}
    <ul class="flex flex-col gap-2 mt-6">
      {{ range .Pages }}
      <li><a href="{{ .RelPermalink }}" style="color:var(--color-ink)">{{ .Title }}</a></li>
      {{ end }}
    </ul>
    {{ end }}

  </div>
</div>
{{ end }}
